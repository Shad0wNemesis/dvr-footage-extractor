plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// ── Version from local.properties (overridden by flutter build --build-name/number) ──

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// ── Release signing — read from key.properties (generated by CI or locally) ──
//
// For local development, create android/key.properties:
//   storeFile=release.keystore    (relative to android/app/)
//   storePassword=<your_password>
//   keyAlias=<your_alias>
//   keyPassword=<your_key_password>
//
// In CI this file is written by the workflow step "Write key.properties".

def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
def hasSigningConfig = keyPropertiesFile.exists()

if (hasSigningConfig) {
    keyPropertiesFile.withReader('UTF-8') { reader -> keyProperties.load(reader) }
}

android {
    namespace "com.quranapp.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.quranapp.app"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    // ── Signing configurations ─────────────────────────────────────────────
    signingConfigs {
        release {
            if (hasSigningConfig) {
                storeFile     file(keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
                keyAlias      keyProperties['keyAlias']
                keyPassword   keyProperties['keyPassword']
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }

        release {
            // Use real keystore when available; fall back to debug signing
            // only for local unsigned builds.
            signingConfig hasSigningConfig
                ? signingConfigs.release
                : signingConfigs.debug

            minifyEnabled true
            shrinkResources true
            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro',
            )
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}
