name: "Noor Al-Quran — iOS Release"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers — mirrors the Android workflow
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
    paths:
      - "quran_app/**"

  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method"
        required: true
        default: "ad-hoc"
        type: choice
        options:
          - ad-hoc          # Direct install (no App Store)
          - app-store       # App Store Connect submission
          - development     # Development devices

# ─────────────────────────────────────────────────────────────────────────────
# Permissions
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.22.0"
  APP_DIR: "quran_app"

jobs:
  build-ios:
    name: "Build iOS IPA"
    runs-on: macos-14          # Apple Silicon runner (M1) — faster than macos-13

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true
          architecture: arm64

      - name: Verify Flutter installation
        run: flutter --version

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install pub dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      # ── Download required assets (fonts + full Quran seed data) ──────────────
      - name: Install Arabic fonts
        run: |
          FONTS="${{ env.APP_DIR }}/assets/fonts"
          mkdir -p "$FONTS"

          # Amiri and NotoNaskhArabic from Google Fonts GitHub mirrors
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/aliftype/amiri/main/fonts/Amiri-Regular.ttf" \
            -o "$FONTS/Amiri-Regular.ttf"
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/aliftype/amiri/main/fonts/Amiri-Bold.ttf" \
            -o "$FONTS/Amiri-Bold.ttf"
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/googlefonts/noto-fonts/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Regular.ttf" \
            -o "$FONTS/NotoNaskhArabic-Regular.ttf"
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/googlefonts/noto-fonts/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Bold.ttf" \
            -o "$FONTS/NotoNaskhArabic-Bold.ttf"

          # KFGQPC Uthmanic Hafs V22
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/quran/quran-android/master/app/src/main/assets/fonts/hafs/uthmanic_hafs_ver22.ttf" \
            -o "$FONTS/UthmanicHafs_V22.ttf" || \
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/mustafa0x/qpc-fonts/master/UthmanicHafs_V22.ttf" \
            -o "$FONTS/UthmanicHafs_V22.ttf"

          ls -lh "$FONTS"

      - name: Download full Quran seed data
        run: |
          python3 ${{ env.APP_DIR }}/scripts/prepare_seed_data.py \
            --output ${{ env.APP_DIR }}/assets/json/

      # ── Code generation ────────────────────────────────────────────────────
      - name: Generate Drift/Riverpod code
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ── CocoaPods ─────────────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        working-directory: ${{ env.APP_DIR }}/ios
        run: pod install --repo-update

      # ── Code signing ──────────────────────────────────────────────────────
      #
      # Required GitHub Secrets:
      #   IOS_CERTIFICATE_BASE64          — base64 of your .p12 certificate file
      #   IOS_CERTIFICATE_PASSWORD        — P12 export password
      #   IOS_PROVISIONING_PROFILE_BASE64 — base64 of your .mobileprovision file
      #   IOS_KEYCHAIN_PASSWORD           — temporary keychain password (any string)
      #
      # How to export certificate:
      #   1. Keychain Access → My Certificates → right-click → Export
      #   2. Save as .p12 with a password
      #   3. base64 -i certificate.p12 | pbcopy → paste into secret
      #
      # How to get provisioning profile:
      #   1. developer.apple.com → Certificates, IDs & Profiles → Profiles
      #   2. Download .mobileprovision
      #   3. base64 -i profile.mobileprovision | pbcopy → paste into secret
      - name: Install signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Copy to the Xcode provisioning profiles directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" | \
            plutil -extract UUID raw -)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      # ── Write ExportOptions.plist ──────────────────────────────────────────
      - name: Write ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${EXPORT_METHOD}</string>
              <key>teamID</key>
              <string>${IOS_TEAM_ID}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      # ── Build IPA ──────────────────────────────────────────────────────────
      - name: Build iOS release (xcarchive)
        working-directory: ${{ env.APP_DIR }}
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          TAG="${{ github.ref_name }}"
          BUILD_NAME="${TAG#v}"
          if [[ -z "$BUILD_NAME" ]]; then BUILD_NAME="1.0.0"; fi

          flutter build ios --release --no-codesign \
            --build-name="$BUILD_NAME" \
            --build-number=${{ github.run_number }}

          # Archive with Xcode
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/NoorAlQuran.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/NoorAlQuran.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      # ── Rename and stage artifact ──────────────────────────────────────────
      - name: Rename artifact
        run: |
          TAG="${{ github.ref_name }}"
          if [[ -z "$TAG" ]]; then TAG="dev-${{ github.run_number }}"; fi

          mkdir -p artifacts
          IPA_FILE=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          if [[ -n "$IPA_FILE" ]]; then
            cp "$IPA_FILE" "artifacts/NoorAlQuran-${TAG}.ipa"
          fi

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      # ── Attach to GitHub Release ───────────────────────────────────────────
      - name: Upload IPA to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipa

      # ── Clean up keychain ──────────────────────────────────────────────────
      - name: Clean up signing credentials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
