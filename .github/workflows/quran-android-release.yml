name: "Noor Al-Quran — Android Release"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  # Automatic release on any semver tag (v1.0.0, v1.2.3-beta, etc.)
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
    paths:
      - "quran_app/**"

  # Manual trigger: useful for building a debug APK without creating a tag.
  workflow_dispatch:
    inputs:
      release_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

# ─────────────────────────────────────────────────────────────────────────────
# Permissions: needed to create releases and upload assets
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Environment variables shared across steps
# ─────────────────────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"
  APP_DIR: "quran_app"

jobs:
  build-android:
    name: "Build Android APK + AAB"
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ───────────────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ── Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      # ── Dependencies ───────────────────────────────────────────────────────
      - name: Install pub dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      # ── Download required assets (fonts + full Quran seed data) ──────────────
      #
      # Strategy (per font):
      #   1. apt install, then case-insensitive find for the installed file
      #   2. curl from known GitHub release / raw URLs (multiple fallbacks)
      #   3. Absolute fallback: copy DejaVuSans (always present) so the step
      #      never fails and flutter build always has a valid TTF file.
      - name: Install Arabic fonts
        run: |
          sudo apt-get install -y fonts-amiri fonts-noto-core fonts-noto-extra 2>/dev/null || true

          FONTS="${{ env.APP_DIR }}/assets/fonts"
          mkdir -p "$FONTS"

          # ── helper: find_apt <glob>  → first file matching glob in /usr/share/fonts
          find_apt() { find /usr/share/fonts -iname "$1" 2>/dev/null | head -1; }

          # ── helper: ensure_font <dest> <apt-glob> [url …]
          #    Tries apt → each url (size-checked) → DejaVu placeholder
          ensure_font() {
            local dest="$1"; shift
            local glob="$1"; shift
            local src
            src=$(find_apt "$glob")
            if [[ -n "$src" ]]; then
              cp "$src" "$dest"
              echo "OK [apt]  $(basename "$dest") ← $src"
              return
            fi
            for url in "$@"; do
              if curl -fsSL --retry 2 --max-time 45 "$url" -o "$dest" 2>/dev/null; then
                sz=$(stat -c%s "$dest" 2>/dev/null || echo 0)
                if [[ "$sz" -gt 4096 ]]; then
                  echo "OK [curl] $(basename "$dest") ← $url"
                  return
                fi
                rm -f "$dest"
              fi
            done
            # Fallback: DejaVuSans is always on ubuntu-latest; the APK will
            # still build and the font slot degrades gracefully at runtime.
            cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf "$dest"
            echo "WARN [fallback] $(basename "$dest") using DejaVu placeholder"
          }

          # Amiri (SIL OFL)
          ensure_font "$FONTS/Amiri-Regular.ttf" "*miri*egular*.ttf" \
            "https://github.com/aliftype/amiri/releases/download/1.000/Amiri-Regular.ttf" \
            "https://github.com/aliftype/amiri/raw/main/fonts/Amiri-Regular.ttf"

          ensure_font "$FONTS/Amiri-Bold.ttf" "*miri*old*.ttf" \
            "https://github.com/aliftype/amiri/releases/download/1.000/Amiri-Bold.ttf" \
            "https://github.com/aliftype/amiri/raw/main/fonts/Amiri-Bold.ttf"

          # NotoNaskhArabic (SIL OFL)
          ensure_font "$FONTS/NotoNaskhArabic-Regular.ttf" "*NaskhArabic*Regular*.ttf" \
            "https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.014/NotoNaskhArabic-Regular.ttf" \
            "https://github.com/notofonts/noto-fonts/raw/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Regular.ttf"

          ensure_font "$FONTS/NotoNaskhArabic-Bold.ttf" "*NaskhArabic*Bold*.ttf" \
            "https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.014/NotoNaskhArabic-Bold.ttf" \
            "https://github.com/notofonts/noto-fonts/raw/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Bold.ttf"

          # UthmanicHafs V22 (KFGQPC — free for Quran apps)
          ensure_font "$FONTS/UthmanicHafs_V22.ttf" "*uthmanic*" \
            "https://github.com/quran/quran-android/raw/master/app/src/main/assets/fonts/hafs/uthmanic_hafs_ver22.ttf" \
            "https://github.com/mustafa0x/qpc-fonts/raw/master/UthmanicHafs_V22.ttf"

          ls -lh "$FONTS"

      - name: Download full Quran seed data
        run: |
          python3 ${{ env.APP_DIR }}/scripts/prepare_seed_data.py \
            --output ${{ env.APP_DIR }}/assets/json/

      # ── Code generation (Drift + Riverpod) ─────────────────────────────────
      - name: Generate Drift/Riverpod code
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ── Signing keystore (release builds only) ─────────────────────────────
      #
      # Required GitHub Secrets:
      #   ANDROID_KEYSTORE_BASE64   — base64 of your .jks / .keystore file
      #   ANDROID_STORE_PASSWORD    — storePassword
      #   ANDROID_KEY_ALIAS         — keyAlias
      #   ANDROID_KEY_PASSWORD      — keyPassword
      #
      # Generate a keystore:
      #   keytool -genkey -v -keystore release.keystore -alias noor \
      #     -keyalg RSA -keysize 2048 -validity 10000
      #   base64 -i release.keystore | pbcopy
      - name: Decode signing keystore
        if: >
          github.event_name == 'push' ||
          github.event.inputs.release_type == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode \
            > ${{ env.APP_DIR }}/android/app/release.keystore

      - name: Write key.properties
        if: >
          github.event_name == 'push' ||
          github.event.inputs.release_type == 'release'
        run: |
          cat > ${{ env.APP_DIR }}/android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Build APK (universal) ──────────────────────────────────────────────
      - name: Build release APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [[ "${{ github.event.inputs.release_type }}" == "debug" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            flutter build apk --debug --no-tree-shake-icons
          else
            flutter build apk --release --no-tree-shake-icons \
              --build-name=$(echo ${{ github.ref_name }} | sed 's/v//') \
              --build-number=${{ github.run_number }}
          fi

      # ── Build AAB (Play Store) ─────────────────────────────────────────────
      - name: Build release AAB
        if: >
          github.event_name == 'push' ||
          github.event.inputs.release_type == 'release'
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter build appbundle --release --no-tree-shake-icons \
            --build-name=$(echo ${{ github.ref_name }} | sed 's/v//') \
            --build-number=${{ github.run_number }}

      # ── Rename artifacts ───────────────────────────────────────────────────
      - name: Rename artifacts
        run: |
          TAG="${{ github.ref_name }}"
          if [[ -z "$TAG" ]]; then TAG="dev-${{ github.run_number }}"; fi

          mkdir -p artifacts

          APK_SRC="${{ env.APP_DIR }}/build/app/outputs/flutter-apk"
          if [[ -f "$APK_SRC/app-release.apk" ]]; then
            cp "$APK_SRC/app-release.apk" "artifacts/NoorAlQuran-${TAG}-universal.apk"
          elif [[ -f "$APK_SRC/app-debug.apk" ]]; then
            cp "$APK_SRC/app-debug.apk" "artifacts/NoorAlQuran-${TAG}-debug.apk"
          fi

          AAB_SRC="${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab"
          if [[ -f "$AAB_SRC" ]]; then
            cp "$AAB_SRC" "artifacts/NoorAlQuran-${TAG}-playstore.aab"
          fi

      # ── Upload build artifacts ─────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      # ── Create GitHub Release (tag pushes only) ────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Noor Al-Quran ${{ github.ref_name }}"
          body: |
            ## Noor Al-Quran ${{ github.ref_name }}

            ### Android Downloads
            | File | Description |
            |------|-------------|
            | `NoorAlQuran-*-universal.apk` | Direct install APK (all architectures) |
            | `NoorAlQuran-*-playstore.aab` | Google Play Store bundle |

            ### Installation (APK)
            1. Enable "Install from unknown sources" in Android Settings
            2. Download the APK file
            3. Open the file and tap Install

            ### What's New
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ---
            Built from commit `${{ github.sha }}` · Run #${{ github.run_number }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
